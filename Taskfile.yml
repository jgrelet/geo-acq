version: "3"

vars:
  ROOT_DIR: '{{.TASKFILE_DIR}}'
  APP_NAME: geo-acq
  SIM_NAME: simul-gps
  SOUNDER_SIM_NAME: simul-echosounder
  EXPORT_NAME: geo-export
  MAIN_PKG: ./cmd/geo-acq
  SIM_PKG: ./cmd/simul/gps
  SOUNDER_SIM_PKG: ./cmd/simul/echosounder
  EXPORT_PKG: ./cmd/export
  BIN_DIR: bin
  DIST_DIR: dist
  WAILS_VERSION: v2.12.0
  WAILS_PKG: github.com/wailsapp/wails/v2/cmd/wails
  WAILS_BUILD_ARGS:
    sh: |
      if [ "{{OS}}" = "linux" ] && command -v pkg-config >/dev/null 2>&1; then
        if pkg-config --exists webkit2gtk-4.1 && ! pkg-config --exists webkit2gtk-4.0; then
          printf "%s" "-tags webkit2_41"
          exit 0
        fi
      fi
      printf ""
  WAILS_BIN:
    sh: |
      if [ "{{OS}}" = "windows" ]; then
        printf "%s/go/bin/wails.exe" "$USERPROFILE"
      else
        printf "%s/go/bin/wails" "$HOME"
      fi
  GOCACHE: '{{default (printf "%s/.gocache" .ROOT_DIR) .GOCACHE}}'
  GOMODCACHE: '{{default (printf "%s/.gomodcache" .ROOT_DIR) .GOMODCACHE}}'
  LDFLAGS: '{{default "" .LDFLAGS}}'
  APP_BIN:
    sh: |
      if [ "{{OS}}" = "windows" ]; then
        printf "geo-acq.exe"
      else
        printf "geo-acq"
      fi
  SIM_BIN:
    sh: |
      if [ "{{OS}}" = "windows" ]; then
        printf "simul-gps.exe"
      else
        printf "simul-gps"
      fi
  SOUNDER_SIM_BIN:
    sh: |
      if [ "{{OS}}" = "windows" ]; then
        printf "simul-echosounder.exe"
      else
        printf "simul-echosounder"
      fi
  EXPORT_BIN:
    sh: |
      if [ "{{OS}}" = "windows" ]; then
        printf "geo-export.exe"
      else
        printf "geo-export"
      fi
  PLATFORMS:
    sh: printf "windows/amd64 linux/amd64 linux/arm64 darwin/amd64"

env:
  GOCACHE: "{{.GOCACHE}}"
  GOMODCACHE: "{{.GOMODCACHE}}"

tasks:
  default:
    cmds:
      - task: help

  help:
    desc: Show available tasks
    silent: true
    cmds:
      - |
        printf "%s\n" \
          "Tasks:" \
          "  task build          Build {{.APP_NAME}} in {{.BIN_DIR}}/" \
          "  task build-all      Build all binaries in {{.BIN_DIR}}/" \
          "  task build-sim      Build the GPS simulator in {{.BIN_DIR}}/" \
          "  task build-sim-sounder Build the echosounder simulator in {{.BIN_DIR}}/" \
          "  task build-export   Build the export tool in {{.BIN_DIR}}/" \
          "  task install-wails  Install the Wails CLI locally if missing" \
          "  task check-gui-prereqs Check that Wails GUI build tools are installed" \
          "  task build-gui-wails Build the Wails GUI prototype" \
          "  task run-gui-wails  Start the Wails GUI prototype in dev mode" \
          "  task test           Run go test ./..." \
          "  task fmt            Run gofmt on the repository" \
          "  task cross-build    Build release binaries in {{.DIST_DIR}}/" \
          "  task run            Build and run {{.APP_NAME}}" \
          "  task copy DEST=/path/to/dir   Copy release artifacts and TOML files" \
          "  task clean          Remove build outputs and local Go caches"

  fmt:
    desc: Format Go packages
    cmds:
      - go fmt ./...

  test:
    desc: Run Go tests
    cmds:
      - go test ./...

  build:
    desc: Build the main application
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/{{.APP_BIN}} {{.MAIN_PKG}}

  build-all:
    desc: Build all project binaries
    deps: [build, build-sim, build-sim-sounder, build-export]

  build-sim:
    desc: Build the GPS simulator
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/{{.SIM_BIN}} {{.SIM_PKG}}

  build-sim-sounder:
    desc: Build the echosounder simulator
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/{{.SOUNDER_SIM_BIN}} {{.SOUNDER_SIM_PKG}}

  build-export:
    desc: Build the export tool
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/{{.EXPORT_BIN}} {{.EXPORT_PKG}}

  install-wails:
    desc: Install the Wails CLI locally if missing
    cmds:
      - |
        if [ ! -x "{{.WAILS_BIN}}" ]; then
          go install {{.WAILS_PKG}}@{{.WAILS_VERSION}}
        fi

  check-gui-prereqs:
    desc: Check that Wails GUI build tools are installed
    deps: [install-wails]
    cmds:
      - |
        if ! command -v npm >/dev/null 2>&1; then
          printf "%s\n" \
            "npm was not found in PATH." \
            "Install Node.js and npm before building the Wails GUI." \
            "Ubuntu/Debian example: sudo apt install nodejs npm" >&2
          exit 1
        fi
      - |
        if [ "{{OS}}" = "linux" ]; then
          if ! command -v pkg-config >/dev/null 2>&1; then
            printf "%s\n" \
              "pkg-config was not found in PATH." \
              "Install the Linux GUI development packages before building the Wails GUI." \
              "Ubuntu 24.04 example: sudo apt install pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev" \
              "Ubuntu 22.04 example: sudo apt install pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev" >&2
            exit 1
          fi
          if ! pkg-config --exists gtk+-3.0; then
            printf "%s\n" \
              "gtk+-3.0 development files were not found." \
              "Ubuntu/Debian example: sudo apt install libgtk-3-dev" >&2
            exit 1
          fi
          if ! pkg-config --exists webkit2gtk-4.0 && ! pkg-config --exists webkit2gtk-4.1; then
            printf "%s\n" \
              "Neither webkit2gtk-4.0 nor webkit2gtk-4.1 development files were found." \
              "Ubuntu 24.04 example: sudo apt install libwebkit2gtk-4.1-dev" \
              "Ubuntu 22.04 example: sudo apt install libwebkit2gtk-4.0-dev" >&2
            exit 1
          fi
        fi

  build-gui-wails:
    desc: Build the Wails GUI prototype
    deps: [check-gui-prereqs]
    cmds:
      - '"{{.WAILS_BIN}}" build -clean {{.WAILS_BUILD_ARGS}}'

  run-gui-wails:
    desc: Run the Wails GUI prototype in dev mode
    deps: [check-gui-prereqs]
    cmds:
      - '"{{.WAILS_BIN}}" dev {{.WAILS_BUILD_ARGS}}'

  run:
    desc: Build and run the main application
    deps: [build]
    cmds:
      - ./{{.BIN_DIR}}/{{.APP_BIN}}

  cross-build:
    desc: Build release binaries for all target platforms
    cmds:
      - mkdir -p {{.DIST_DIR}}
      - |
        for target in {{.PLATFORMS}}; do
          os="${target%/*}"
          arch="${target#*/}"
          ext=""
          if [ "$os" = "windows" ]; then ext=".exe"; fi
          echo ">> building {{.APP_NAME}} for $os/$arch"
          CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
            go build -ldflags "{{.LDFLAGS}}" \
            -o {{.DIST_DIR}}/{{.APP_NAME}}-"$os"-"$arch""$ext" {{.MAIN_PKG}} || exit 1
        done

  copy:
    desc: Copy release artifacts and TOML files to DEST
    requires:
      vars: [DEST]
    deps: [cross-build]
    cmds:
      - mkdir -p {{.DEST}}
      - cp {{.DIST_DIR}}/{{.APP_NAME}}-* {{.DEST}}/
      - cp ./*.toml {{.DEST}}/

  clean:
    desc: Remove build outputs and local Go caches
    cmds:
      - rm -rf {{.BIN_DIR}} {{.DIST_DIR}} {{.GOCACHE}} {{.GOMODCACHE}}
